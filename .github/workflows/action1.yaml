name: first action

on: 
    - push
    - workflow_dispatch

jobs:
    first_job:
        runs-on: ubuntu-latest
        steps:
            - name: checkout repo
              uses: actions/checkout@v5

            - name: welcome message
              run: echo "My first action"
            
            - name: list files
              run: |
                ls
                cat README.md
            
            - name: Generate ASCII artwork
              run: cowsay -f tiger "Run for cover, I am dragon.. RAWR" >> dragon.txt

