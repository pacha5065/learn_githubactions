name: matrix config test

on:
    push:
    workflow_dispatch:
      
jobs:
    deploy:
        strategy:
          matrix:
            os: [ubuntu-latest, windows-latest, ubuntu-20.04]
            images: [hello-world, alpine]
        runs-on: ${{matrix.os}}
        steps:
            - name: echo docker details
              run: docker info
            
            - name: run image on ${{matrix.os}} with image ${{matrix.images}}
              run: docker run ${{matrix.images}}
