name: matrix config test

on:
    push:
    workflow_dispatch:
      
jobs:
    deploy:
        concurrency:
            group: matrix
            cancel-in-progress: true
        strategy:
          fail-fast: false
          max-parallel: 2
          matrix:
            os: [ubuntu-latest, windows-latest]
            images: [hello-world, alpine]
            exclude:
              - images: alpine
                os: windows-latest    
            include:
              - images: amd64/alpine
                os: ubuntu-latest            
        runs-on: ${{matrix.os}}
        steps:
            - name: echo docker details
              run: docker info
            
            - name: run image on ${{matrix.os}} with image ${{matrix.images}}
              run: docker run ${{matrix.images}}
