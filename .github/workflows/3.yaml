name: multi job action

on: 
    push

jobs:
    build_job:
        runs-on: ubuntu-latest
        steps:
            - name: checkout repo
              uses: actions/checkout@v6
            
            - name: install cowsay and run
              run: |
                sudo apt-get install cowsay -y
                cowsay -f dragon "run for ur lives ... " >> dragon.txt
    
            - name: sleep for 10 sec
              run: sleep 10
    test_job:
        runs-on: ubuntu-latest
        steps:
            - name: verify the file existence
              run: grep -i "dragon" dragon.txt
    
    deploy_job:
        runs-on: ubuntu-latest
        steps:
            - name: read file
              run: cat dragon.txt

            - name: deployig
              run: echo "Deployig ..."